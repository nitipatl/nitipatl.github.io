.wdl-top{text-align:center;}
.wdl-top h1{font-size:28px;font-weight:800;letter-spacing:4px;color:#fff;margin-bottom:4px;}

  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;text-transform:uppercase;color:#fff;
  transition:border-color .1s;
}
.wdl-cell.filled{border-color:#888;}
.wdl-cell.correct{background:#538d4e;border-color:#538d4e;}
.wdl-cell.present{background:#b59f3b;border-color:#b59f3b;}
.wdl-cell.absent{background:#3a3a3c;border-color:#3a3a3c;}
.wdl-cell.shake{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.wdl-cell.pop{animation:pop .1s ease;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}

  background:#818384;color:#fff;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0 6px;transition:background .15s;
}

.kb-key.correct{background:#538d4e;}
.kb-key.present{background:#b59f3b;}

.screen{display:none;}
.screen.active{display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px 0;}

/* ===== WORDLE SCREEN ===== */
.wdl-wrap{
  background:#fff;width:100%;max-width:420px;border-radius:20px;
  box-shadow:0 4px 24px rgba(0,0,0,.18);padding:24px 16px 20px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.wdl-cat{width:72px;height:72px;border-radius:50%;overflow:hidden;border:3px solid #06C755;}
.wdl-cat img{width:100%;height:100%;object-fit:cover;}
.wdl-title{font-size:22px;font-weight:700;color:#06C755;}
.wdl-sub{font-size:13px;color:#666;text-align:center;line-height:1.5;}
.wdl-hint{font-size:12px;color:#888;text-align:center;min-height:16px;}

/* grid */
.wdl-grid{display:flex;flex-direction:column;gap:5px;}
.wdl-row{display:flex;gap:5px;}
.wdl-cell{
  width:44px;height:44px;border:2px solid #d3d6da;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;text-transform:uppercase;
  transition:background .2s,border-color .2s,color .2s;
}
.wdl-cell.filled{border-color:#999;}
.wdl-cell.correct{background:#06C755;border-color:#06C755;color:#fff;}
.wdl-cell.present{background:#c9b458;border-color:#c9b458;color:#fff;}
.wdl-cell.absent{background:#787c7e;border-color:#787c7e;color:#fff;}
.wdl-cell.flip{animation:flip .4s ease;}
@keyframes flip{0%{transform:scaleY(1)}50%{transform:scaleY(0)}100%{transform:scaleY(1)}}
.wdl-cell.pop{animation:pop .1s ease;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}

/* keyboard */
.wdl-keyboard{display:flex;flex-direction:column;gap:6px;width:100%;}
.kb-row{display:flex;gap:4px;justify-content:center;}
.kb-key{
  min-width:30px;height:40px;border-radius:6px;border:none;
  background:#d3d6da;color:#111;font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 6px;
  transition:background .2s,color .2s;
}
.kb-key.wide{min-width:52px;font-size:11px;}
.kb-key.correct{background:#06C755;color:#fff;}
.kb-key.present{background:#c9b458;color:#fff;}
.kb-key.absent{background:#787c7e;color:#fff;}
.wdl-msg{font-size:14px;font-weight:600;color:#333;min-height:20px;text-align:center;}

/* ===== CHAT SCREEN ===== */


.wrap{background:#B2D6B0;width:420px;max-width:100vw;min-width:320px;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.18);display:flex;flex-direction:column;min-height:600px;flex-shrink:0;}
.hdr{background:#06C755;padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-av{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.hdr-av img{width:100%;height:100%;object-fit:cover;}
.hdr-name{color:#fff;font-size:16px;font-weight:600;}
.hdr-sub{color:rgba(255,255,255,.8);font-size:12px;}
.chat{padding:14px 12px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;scroll-behavior:smooth;flex:1;}
.date-div{text-align:center;font-size:11px;color:rgba(0,0,0,.4);margin:2px 0;}
.row{display:flex;align-items:flex-end;gap:8px;}
.row.me{flex-direction:row-reverse;}
.av{width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#fff;}
.av img{width:100%;height:100%;object-fit:cover;}
.bub{max-width:250px;padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;}
.row.them .bub{background:#fff;color:#222;border-bottom-left-radius:4px;}
.row.me .bub{background:#06C755;color:#fff;border-bottom-right-radius:4px;}
.ts{font-size:11px;color:rgba(0,0,0,.35);flex-shrink:0;align-self:flex-end;}
.typing-row{display:flex;align-items:flex-end;gap:8px;}
.typing-bub{background:#fff;border-radius:18px;border-bottom-left-radius:4px;padding:11px 15px;display:flex;gap:4px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:#bbb;animation:bonce 1s infinite;}
.dot:nth-child(2){animation-delay:.15s;}
.dot:nth-child(3){animation-delay:.3s;}
@keyframes bonce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.choices{padding:8px 12px 14px;display:flex;flex-wrap:wrap;gap:8px;flex-shrink:0;}
.cbtn{background:#fff;border:1.5px solid #06C755;border-radius:20px;padding:8px 15px;font-size:13px;color:#06C755;cursor:pointer;font-weight:600;transition:all .15s;}
.cbtn:hover{background:#06C755;color:#fff;}
.cbtn.other{border-style:dashed;color:#999;border-color:#bbb;}

document.addEventListener('DOMContentLoaded',function(){

var _W='KHAOJAO',_ROWS=6,_COLS=7,_g=[],_cur='',_over=false,_km={};
var _grid=document.getElementById('wdl-grid');
for(var r=0;r<_ROWS;r++){
  var _row=document.createElement('div');_row.className='wrow';_row.id='_r'+r;
  for(var c=0;c<_COLS;c++){
    var _d=document.createElement('div');_d.className='wcell';_d.id='_c'+r+'_'+c;
    _row.appendChild(_d);
  }
  _grid.appendChild(_row);
}
[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ส่ง','Z','X','C','V','B','N','M','DEL']].forEach(function(row){
  var _r=document.createElement('div');_r.className='kbrow';
  row.forEach(function(k){
    var _b=document.createElement('button');
    _b.className='wkey'+(k.length>1?' wwide':'')+(k==='ส่ง'?' wsend':'');
    _b.textContent=k;_b.dataset.wk=k;
    _b.onclick=function(){_press(k);};
    _r.appendChild(_b);
  });
  document.getElementById('wdl-kb').appendChild(_r);
});
function _cell(r,c){return document.getElementById('_c'+r+'_'+c);}
function _render(){
  var r=_g.length;
  for(var c=0;c<_COLS;c++){var d=_cell(r,c);if(!d)continue;d.textContent=_cur[c]||'';d.className='wcell'+(_cur[c]?' wfilled':'');}
}
function _msg(txt,keep){
  var m=document.getElementById('wdl-msg');m.textContent=txt;m.style.visibility='visible';
  if(!keep)setTimeout(function(){m.style.visibility='hidden';},1800);
}
function _press(k){
  if(_over)return;
  if(k==='DEL'){_cur=_cur.slice(0,-1);_render();return;}
  if(k==='ส่ง'){_submit();return;}
  if(_cur.length<_COLS){_cur+=k;_render();}
}
function _submit(){
  if(_cur.length<_COLS){_shake(_g.length);_msg('กรอกให้ครบ '+_COLS+' ตัว');return;}
  var g=_cur;_g.push(g);_cur='';
  var res=_score(g),rr=_g.length-1;
  res.forEach(function(st,c){
    setTimeout(function(){
      var d=_cell(rr,c);
      if(d){d.textContent=g[c];d.className='wcell w'+st;}
      var l=g[c],p={correct:3,present:2,absent:1};
      if(!_km[l]||p[st]>p[_km[l]]){_km[l]=st;document.querySelectorAll('[data-wk="'+l+'"]').forEach(function(b){b.className='wkey'+(b.classList.contains('wwide')?' wwide':'')+' w'+st;});}
    },c*70);
  });
  setTimeout(function(){
    if(g===_W){_over=true;_msg('🎉 ถูกแล้ว!',true);setTimeout(_toChat,1800);}
    else if(_g.length>=_ROWS){
  _over=true;
  var _loseDiv=document.createElement('div');
  _loseDiv.style.cssText='display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:4px;';
  _loseDiv.innerHTML='<div style="color:#fff;font-size:13px;font-weight:700;">ลองใหม่อีกน่ะ 😅</div><button onclick="location.reload()" style="background:#06C755;color:#fff;border:none;border-radius:20px;padding:10px 28px;font-size:14px;font-weight:700;cursor:pointer;">🔄 ลองใหม่</button>';
  document.getElementById('wdl-screen').appendChild(_loseDiv);
}
    else{_msg('เหลือ '+(_ROWS-_g.length)+' ครั้ง');}
  },_COLS*70+250);
}
function _score(guess){
  var res=Array(_COLS).fill('absent'),wa=_W.split(''),used=Array(_COLS).fill(false);
  guess.split('').forEach(function(l,i){if(l===wa[i]){res[i]='correct';used[i]=true;}});
  guess.split('').forEach(function(l,i){
    if(res[i]==='correct')return;
    var j=wa.findIndex(function(x,xi){return !used[xi]&&x===l;});
    if(j!==-1){res[i]='present';used[j]=true;}
  });
  return res;
}
function _shake(r){
  for(var c=0;c<_COLS;c++){(function(d){if(!d)return;d.classList.add('wshake');setTimeout(function(){d.classList.remove('wshake');},400);})(_cell(r,c));}
}

const chat = document.getElementById('chat');
const choicesEl = document.getElementById('choices');
let introIdx = 0;

function ts(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function sb(){chat.scrollTop=chat.scrollHeight;}

function avHTML(side){
  return `<div class="av"><img src="${side==='me'?OUM:CAT}" /></div>`;
}

function addMsg(side,text){
  const r=document.createElement('div'); r.className='row '+side;
  const t=ts();
  r.innerHTML=side==='me'
    ?`<span class="ts">${t}</span><div class="bub">${text}</div>${avHTML(side)}`
    :`${avHTML(side)}<div class="bub">${text}</div><span class="ts">${t}</span>`;
  chat.appendChild(r); sb();
}

function showTyping(){
  removeTyping();
  const r=document.createElement('div'); r.className='typing-row'; r.id='typ';
  r.innerHTML=`${avHTML('them')}<div class="typing-bub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(r); sb();
}
function removeTyping(){const t=document.getElementById('typ');if(t)t.remove();}

function showNode(key){
  const node=TREE[key];
  if(!node)return;
  showTyping();
  setTimeout(()=>{
    removeTyping();
    addMsg('them',node.q);
    showChoices(node.choices, key);
  },900);
}

function showChoices(choices, nodeKey){
  choicesEl.innerHTML='';
  choices.forEach(c=>{
    const b=document.createElement('button'); b.className='cbtn';
    b.textContent=c.label;
    b.onclick=()=>{
      choicesEl.innerHTML='';
      addMsg('me',c.label);
      if(c.next) setTimeout(()=>showNode(c.next),500);
      else if(c.gift) setTimeout(()=>showGift(c.label,c.gift),500);
    };
    choicesEl.appendChild(b);
  });
  // Other option
  const ob=document.createElement('button'); ob.className='cbtn other';
  ob.textContent='อื่นๆ พิมพ์เอง...';
  ob.onclick=()=>showCustom(nodeKey);
  choicesEl.appendChild(ob);
  sb();
}

function showCustom(nodeKey){
  choicesEl.innerHTML='';
  const w=document.createElement('div'); w.className='cust-wrap';
  const inp=document.createElement('input'); inp.className='cust-inp';
  inp.placeholder='อยากได้อะไร? พิมพ์มาเลย...';
  const btn=document.createElement('button'); btn.className='cbtn'; btn.textContent='ส่ง >';
  const go=()=>{
    const v=inp.value.trim(); if(!v)return;
    choicesEl.innerHTML='';
    addMsg('me',v);
    setTimeout(()=>showGift(v,{emoji:'🎁',title:v,hb:`Happy Birthday อุ้ม! เต้ยจัดให้แน่นอน รักเธอมากกก ♥`}),500);
  };
  btn.onclick=go;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  w.appendChild(inp); w.appendChild(btn);
  choicesEl.appendChild(w);
  setTimeout(()=>inp.focus(),100); sb();
}

function runIntro(){
  if(introIdx>=INTRO.length){setTimeout(()=>showNode('root'),600);return;}
  const msg=INTRO[introIdx];
  if(msg.s==='them'){
    showTyping();
    setTimeout(()=>{removeTyping();addMsg(msg.s,msg.t);introIdx++;setTimeout(runIntro,700);},1000);
  }else{
    setTimeout(()=>{addMsg(msg.s,msg.t);introIdx++;setTimeout(runIntro,600);},400);
  }
}
